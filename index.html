<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Tugas Dart - Jeinnet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 900px; width: 100%; text-align: center; }
        .description { text-align: left; background: #f8f9fa; padding: 15px; border-left: 5px solid #007bff; margin-bottom: 20px; border-radius: 5px; }
        .btn-source { background-color: #0175c2; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(1, 117, 194, 0.3); }
        .btn-source:hover { background-color: #015a96; transform: translateY(-2px); }
        .output-capture { width: 100%; border-radius: 10px; border: 2px solid #dee2e6; }
        
        /* Modal Popup */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background-color: #fff; margin: 2% auto; padding: 20px; width: 90%; height: 85%; border-radius: 12px; position: relative; }
        .close { position: absolute; right: 25px; top: 15px; font-size: 30px; font-weight: bold; cursor: pointer; color: #dc3545; }
        iframe { width: 100%; height: 92%; border: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="description">
        <h2 style="margin-top:0; color: #0175c2;">Program Deret Fibonacci</h2>
        <p>Program ini mengimplementasikan algoritma rekursif untuk menghasilkan deret Fibonacci hingga suku ke-20. Dibuat menggunakan bahasa pemrograman Dart sebagai bagian dari tugas praktikum.</p>
        <strong>Mahasiswa: Jeinnet Verara Ayomi</strong>
    </div>

    <button class="btn-source" onclick="openModal()">📂 Buka Source Code (DartPad)</button>

    <div class="image-container">
        <img src="https://via.placeholder.com/800x400?text=Screenshot+Output+Fibonacci+Jeinnet" alt="Output Program" class="output-capture">
    </div>
</div>

<div id="dartpadModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 style="margin-top: 0; color: #333;">Interactive DartPad Editor</h3>
        <iframe src="https://dartpad.dev/embed-dart.html?id=05f8ca02eabc50bd8fd8c310349233a1"></iframe>
    </div>
</div>

<script>
    function openModal() { document.getElementById("dartpadModal").style.display = "block"; }
    function closeModal() { document.getElementById("dartpadModal").style.display = "none"; }
    window.onclick = function(event) {
        let modal = document.getElementById("dartpadModal");
        if (event.target == modal) { modal.style.display = "none"; }
    }
</script>

</body>
</html>
