<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Tugas Dart</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        
        /* Bagian Deskripsi */
        .description { margin-bottom: 15px; color: #333; line-height: 1.6; border-left: 4px solid #007bff; padding-left: 15px; }
        
        /* Tombol Source Code */
        .btn-source { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 15px; }
        .btn-source:hover { background-color: #0056b3; }

        /* Gambar Capture Output */
        .output-capture { width: 100%; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; }

        /* Modal (Popup) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; width: 80%; height: 80%; border-radius: 10px; position: relative; }
        .close { position: absolute; right: 20px; top: 10px; font-size: 28px; font-weight: bold; cursor: pointer; color: #ff4d4d; }
        
        iframe { width: 100%; height: 95%; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="description">
        <h3>Program Perhitungan Diskon Hotel</h3>
        <p>Program ini dibuat menggunakan Dart untuk menghitung biaya menginap berdasarkan tipe kamar dan durasi, lengkap dengan logika diskon otomatis.</p>
    </div>

    <button class="btn-source" onclick="openModal()">💻 Lihat Source Code (DartPad)</button>

    <div class="image-container">
        <img src="https://via.placeholder.com/800x400?text=Screenshot+Output+Program" alt="Output Program" class="output-capture">
    </div>
</div>

<div id="dartpadModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 style="margin-top: 0;">Source Code: Perhitungan Hotel</h3>
        <iframe src="https://dartpad.dev/embed-dart.html?id=b6c208947e303728fca02d7334460742"></iframe>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById("dartpadModal").style.display = "block";
    }
    function closeModal() {
        document.getElementById("dartpadModal").style.display = "none";
    }
    // Tutup modal jika user klik di luar area modal
    window.onclick = function(event) {
        let modal = document.getElementById("dartpadModal");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
